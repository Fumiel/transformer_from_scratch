name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e .[dev]
          python -m pip install torch
      - name: Test
        run: pytest
      - name: Lint
        run: ruff check python tests

  cpp-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build
      - name: Build
        run: cmake --build build
      - name: Smoke test
        run: ./build/tiny_transformer_cpp
